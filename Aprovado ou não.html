
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Aprovado ou Reprovado</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
      padding: 50px;
    }

    .container {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #resultado {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Verificar Situação</h2>

    <input type="number" id="n1" placeholder="Nota N1">
    <input type="number" id="n2" placeholder="Nota N2">

    <br>
    <button onclick="calcular()">Calcular</button>

    <p id="resultado"></p>
  </div>

  <script>
    function calcular() {
      let n1 = parseInt(document.getElementById("n1").value);
      let n2 = parseInt(document.getElementById("n2").value);

      let media = (n1 + n2) / 2;
      let resultado = document.getElementById("resultado");

      if (media >= 6) {
        resultado.innerHTML = "Aprovado";
        resultado.style.color = "blue";
      } else {
        resultado.innerHTML = "Reprovado";
        resultado.style.color = "red";
      }
    }
  </script>

</body>
</html>
