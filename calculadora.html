<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Calculadora</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
      padding: 50px;
    }

    .container {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 90%;
      padding: 8px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #resultado {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Calculadora</h2>

    <input type="number" id="v1" placeholder="Valor 1">
    <input type="number" id="v2" placeholder="Valor 2">

    <select id="operacao">
      <option value="+">Soma (+)</option>
      <option value="-">Subtração (-)</option>
      <option value="*">Multiplicação (*)</option>
      <option value="/">Divisão (/)</option>
    </select>

    <br>
    <button onclick="calcular()">Calcular</button>

    <p id="resultado"></p>
  </div>

  <script>
    function calcular() {
      let v1 = parseFloat(document.getElementById("v1").value);
      let v2 = parseFloat(document.getElementById("v2").value);
      let op = document.getElementById("operacao").value;
      let resultado;

      if (op == "+") resultado = v1 + v2;
      else if (op == "-") resultado = v1 - v2;
      else if (op == "*") resultado = v1 * v2;
      else if (op == "/") {
        if (v2 == 0) {
          document.getElementById("resultado").innerHTML = "Erro: divisão por zero";
          return;
        }
        resultado = v1 / v2;
      }

      document.getElementById("resultado").innerHTML = "Resultado: " + resultado;
    }
  </script>

</body>
</html>
