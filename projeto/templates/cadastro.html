<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - ServiConnect</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/Style.css') }}">
</head>

<body>

<header>

    <div class="logo">
        ServiConnect
    </div>

    <nav>

        <a href="{{ url_for('main.home') }}">
            Home
        </a>

        <a href="{{ url_for('main.login') }}">
            Login
        </a>

    </nav>

</header>

<div class="login-container">

    <div class="card">

        <h2>
            Criar Conta
        </h2>

        {% if erro %}
            <p class="erro-msg">
                {{ erro }}
            </p>
        {% endif %}

        <!-- FORM NORMAL -->
        <form action="/cadastro" method="POST">

            <input
                type="text"
                name="nome"
                placeholder="Nome completo"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
            >

            <input
                type="text"
                name="cpf"
                placeholder="CPF"
                required
            >

            <div class="input-wrapper">

                <input
                    type="password"
                    id="senha-cadastro"
                    name="senha"
                    placeholder="Senha"
                    required
                >

                <svg
                    class="eye-icon"
                    id="toggle-senha-cadastro"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#888"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >

                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>

                    <circle cx="12" cy="12" r="3"/>

                </svg>

            </div>

            <button type="submit">
                Cadastrar
            </button>

        </form>

        <!-- DIVISOR -->
        <div class="divider">
            ou
        </div>

        <!-- GOOGLE -->
        <a
            href="{{ url_for('main.google_login') }}"
            class="btn-google"
        >

            <img
                src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
                width="18"
            >

            Cadastrar com Google

        </a>

        <!-- LOGIN -->
        <div class="login-link">

            Já tem conta?

            <a href="{{ url_for('main.login') }}">
                Entrar
            </a>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/codefront.js') }}"></script>

</body>
</html>
