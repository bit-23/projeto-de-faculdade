<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/Style.css') }}">
    <title>Login - ServiConnect</title>
</head>

<body>

<header>
    <div class="logo">ServiConnect</div>
    <nav>

<div class="login-container">

</div>

</body>
</html>
