<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Style.css') }}">
    <title>Login - ServiConnect</title>
</head>

<body>

<header>
    <div class="logo">ServiConnect</div>
    <nav>
        <a href="{{ url_for('main.home') }}">Home</a>
        <a href="{{ url_for('main.categoria') }}">Categorias</a>
    </nav>
</header>

<div class="login-container">
    <div class="login-box">
        <h2>Login</h2>

        {% if erro %}
        <p class="erro-msg">{{ erro }}</p>
        {% endif %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <div class="input-wrapper">
                <input type="password" id="senha-login" name="senha" placeholder="Senha" required>
                <svg class="eye-icon" id="toggle-senha-login" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </div>
            <button type="submit">Entrar</button>
        </form>

        <div class="divider">ou</div>

        <a href="{{ url_for('main.google_login') }}" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a23.99 23.99 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Entrar com Google
        </a>
    </div>
</div>

<script src="{{ url_for('static', filename='js/codefront.js') }}"></script>
</body>
</html>
